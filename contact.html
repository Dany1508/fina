      <form>
        <div class="container mt-5">
  <h2 class="mb-4 text-center">Contáctame</h2>

  <form id="contact-form" class="p-4 shadow rounded bg-light">

    <!-- Nombre -->
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" name="from_name" class="form-control" required>
    </div>

    <!-- Correo -->
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" name="reply_to" class="form-control" required>
    </div>

    <!-- Mensaje -->
    <div class="mb-3">
      <label class="form-label">Mensaje</label>
      <textarea name="message" class="form-control" rows="5" required></textarea>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Enviar mensaje
    </button>

  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
emailjs.init({
  publicKey: "X4810Jd4cTDp5Vor-",
});

document.getElementById("contact-form")
  .addEventListener("submit", function (event) {
    event.preventDefault();

    emailjs.sendForm("service_8xn4pus", "template_flween6", this)
      .then(() => {
        alert("Mensaje enviado correctamente");
        this.reset();
      })
      .catch((error) => {
        console.error("ERROR:", error);
        alert("Error al enviar");
      });
});
</script>
